apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prom-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  #finalizers:
#   - resources-finalizer.argocd.io
spec:
  project: default
  source:
    # Wrapper Helm chart with Chart.yaml — deploy directly from Git path
    repoURL: https://github.com/rbalman/temp-repo.git
    targetRevision: HEAD
    path: k8s/addons/02-kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for large CRDs (Prometheus CRDs exceed annotation size limit)
