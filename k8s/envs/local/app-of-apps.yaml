apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/rbalman/gokite.git
    targetRevision: HEAD
    path: k8s/envs/local/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
