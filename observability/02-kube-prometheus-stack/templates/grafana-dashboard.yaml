apiVersion: v1
kind: ConfigMap
metadata:
  name: cs-auditor-dashboard
  labels:
    grafana_dashboard: "1"
data:
  cs-auditor.json: |-
    {
      "title": "CS Auditor - Pod Health",
      "uid": "cs-auditor",
      "panels": [
        {
          "id": 1,
          "title": "Backend Available Replicas",
          "type": "stat",
          "targets": [{"expr": "kube_deployment_status_replicas_available{namespace=\"default\", deployment=\"auditor-be-cs-auditor-be\"}"}]
        },
        {
          "id": 2,
          "title": "Frontend Available Replicas",
          "type": "stat",
          "targets": [{"expr": "kube_deployment_status_replicas_available{namespace=\"default\", deployment=\"auditor-fe-cs-auditor-fe\"}"}]
        },
        {
          "id": 3,
          "title": "MongoDB Ready Replicas",
          "type": "stat",
          "targets": [{"expr": "kube_statefulset_status_replicas_ready{namespace=\"default\", statefulset=\"mongo\"}"}]
        },
        {
          "id": 4,
          "title": "Pod Restart Count",
          "type": "graph",
          "targets": [{"expr": "kube_pod_container_status_restarts_total{namespace=\"default\", pod=~\"cs-auditor.*|mongo.*\"}", "legendFormat": "{{ `{{pod}}` }}"}]
        },
        {
          "id": 5,
          "title": "Pod Status",
          "type": "graph",
          "targets": [{"expr": "kube_pod_status_phase{namespace=\"default\", pod=~\"cs-auditor.*|mongo.*\"}", "legendFormat": "{{ `{{pod}}` }} - {{ `{{phase}}` }}"}]
        }
      ]
    }