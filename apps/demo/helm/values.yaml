replicaCount: 1

image:
  repository: demo-app
  tag: v0.0.3
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  startup:
    path: /health
    periodSeconds: 2
    failureThreshold: 15

otel:
  serviceName: demo-app
  endpoint: otel-collector.monitoring.svc.cluster.local:4317
  resourceAttributes: ""

serviceMonitor:
  enabled: true
  interval: 15s
  release: prom-stack

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: demo.local
  path: /
  pathType: Prefix
  tls: []

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
