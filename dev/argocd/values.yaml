argocd:
  global:
    domain: argocd.localhost

  # Non-HA: disable redis-ha, keep bundled single redis
  redis-ha:
    enabled: false

  redis:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  controller:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1024Mi

  server:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  repoServer:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  applicationSet:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  notifications:
    enabled: false
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

  dex:
    enabled: false
    replicas: 0

  # Terminate TLS at ingress, ArgoCD serves plain HTTP
  configs:
    params:
      server.insecure: true

  server:
    ingress:
      enabled: true
      hosts:
        - argocd.localhost
      path: /
      pathType: Prefix
