apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-app-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  otel-app.json: |
    {
      "title": "OTel App - Golden Signals",
      "uid": "otel-app",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [

        { "id": 10, "type": "row", "title": "Golden Signals", "collapsed": false, "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 } },

        {
          "id": 11, "title": "Request Rate", "type": "stat",
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "graphMode": "area", "colorMode": "value", "textMode": "auto" },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(http_requests_total{app=\"otel-app\"}[2m]))", "legendFormat": "rps" } ]
        },

        {
          "id": 12, "title": "Error Rate (5xx)", "type": "stat",
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
          "fieldConfig": { "defaults": { "unit": "percentunit", "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 0.01 }, { "color": "red", "value": 0.05 } ] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "graphMode": "area", "colorMode": "background", "textMode": "auto" },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(http_requests_total{app=\"otel-app\", http_status_code=~\"5..\"}[2m])) / sum(rate(http_requests_total{app=\"otel-app\"}[2m]))", "legendFormat": "error rate" } ]
        },

        {
          "id": 13, "title": "P50 Latency", "type": "stat",
          "gridPos": { "x": 12, "y": 1, "w": 6, "h": 4 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 0.1 }, { "color": "red", "value": 0.5 } ] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "graphMode": "area", "colorMode": "value", "textMode": "auto" },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{app=\"otel-app\"}[2m])) by (le))", "legendFormat": "p50" } ]
        },

        {
          "id": 14, "title": "P99 Latency", "type": "stat",
          "gridPos": { "x": 18, "y": 1, "w": 6, "h": 4 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 0.5 }, { "color": "red", "value": 1 } ] } } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "graphMode": "area", "colorMode": "background", "textMode": "auto" },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{app=\"otel-app\"}[2m])) by (le))", "legendFormat": "p99" } ]
        },

        { "id": 20, "type": "row", "title": "Traffic", "collapsed": false, "gridPos": { "x": 0, "y": 5, "w": 24, "h": 1 } },

        {
          "id": 21, "title": "Request Rate by Route", "type": "timeseries",
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(http_requests_total{app=\"otel-app\"}[2m])) by (http_route, http_method)", "legendFormat": "{{ "{{" }}http_method{{ "}}" }} {{ "{{" }}http_route{{ "}}" }}" }
          ]
        },

        {
          "id": 22, "title": "Request Rate by Status Code", "type": "timeseries",
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(http_requests_total{app=\"otel-app\"}[2m])) by (http_status_code, http_route)", "legendFormat": "{{ "{{" }}http_status_code{{ "}}" }} {{ "{{" }}http_route{{ "}}" }}" }
          ]
        },

        { "id": 30, "type": "row", "title": "Errors", "collapsed": false, "gridPos": { "x": 0, "y": 14, "w": 24, "h": 1 } },

        {
          "id": 31, "title": "Error Rate % by Route", "type": "timeseries",
          "gridPos": { "x": 0, "y": 15, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_requests_total{app=\"otel-app\", http_status_code=~\"5..\"}[2m])) by (http_route) / sum(rate(http_requests_total{app=\"otel-app\"}[2m])) by (http_route)",
              "legendFormat": "5xx {{ "{{" }}http_route{{ "}}" }}"
            }
          ]
        },

        {
          "id": 32, "title": "5xx Error Rate (explicit counter)", "type": "timeseries",
          "gridPos": { "x": 12, "y": 15, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "legend": { "calcs": ["last", "max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(http_errors_total{app=\"otel-app\"}[2m])) by (http_route, http_status_code)", "legendFormat": "{{ "{{" }}http_status_code{{ "}}" }} {{ "{{" }}http_route{{ "}}" }}" }
          ]
        },

        { "id": 40, "type": "row", "title": "Latency", "collapsed": false, "gridPos": { "x": 0, "y": 23, "w": 24, "h": 1 } },

        {
          "id": 41, "title": "Latency Percentiles by Route", "type": "timeseries",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 2, "fillOpacity": 5 } } },
          "options": { "legend": { "calcs": ["last", "mean", "max"], "displayMode": "table", "placement": "bottom" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{app=\"otel-app\"}[2m])) by (le, http_route))", "legendFormat": "p50 {{ "{{" }}http_route{{ "}}" }}" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{app=\"otel-app\"}[2m])) by (le, http_route))", "legendFormat": "p95 {{ "{{" }}http_route{{ "}}" }}" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{app=\"otel-app\"}[2m])) by (le, http_route))", "legendFormat": "p99 {{ "{{" }}http_route{{ "}}" }}" }
          ]
        },

        {
          "id": 42, "title": "Request Duration Heatmap (otelhttp, finer buckets)", "type": "heatmap",
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 8 },
          "options": {
            "calculate": false,
            "yAxis": { "unit": "s", "decimals": 3 },
            "color": { "scheme": "Oranges", "mode": "scheme", "steps": 64 },
            "cellGap": 1,
            "tooltip": { "show": true, "yHistogram": false }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_server_request_duration_seconds_bucket{app=\"otel-app\"}[2m])) by (le)",
              "legendFormat": "{{ "{{" }}le{{ "}}" }}",
              "format": "heatmap"
            }
          ]
        },

        { "id": 70, "type": "row", "title": "Logs", "collapsed": false, "gridPos": { "x": 0, "y": 32, "w": 24, "h": 1 } },

        {
          "id": 71, "title": "Log Volume by Level", "type": "timeseries",
          "gridPos": { "x": 0, "y": 33, "w": 8, "h": 10 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "bars",
                "lineWidth": 0,
                "fillOpacity": 100,
                "gradientMode": "none",
                "stacking": { "group": "A", "mode": "normal" },
                "barAlignment": 0
              }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "error" },   "properties": [ { "id": "color", "value": { "fixedColor": "red",    "mode": "fixed" } } ] },
              { "matcher": { "id": "byName", "options": "warn" },    "properties": [ { "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } } ] },
              { "matcher": { "id": "byName", "options": "warning" }, "properties": [ { "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } } ] },
              { "matcher": { "id": "byName", "options": "info" },    "properties": [ { "id": "color", "value": { "fixedColor": "green",  "mode": "fixed" } } ] },
              { "matcher": { "id": "byName", "options": "debug" },   "properties": [ { "id": "color", "value": { "fixedColor": "blue",   "mode": "fixed" } } ] }
            ]
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(count_over_time({service_name=\"otel-app\"} | json | level != \"\" [$__interval])) by (level)",
              "legendFormat": "{{ "{{" }}level{{ "}}" }}"
            }
          ]
        },

        {
          "id": 72, "title": "Logs", "type": "logs",
          "gridPos": { "x": 8, "y": 33, "w": 16, "h": 10 },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{service_name=\"otel-app\"}",
              "legendFormat": ""
            }
          ]
        }

      ]
    }
