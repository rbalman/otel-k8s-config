apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-app-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  otel-app.json: |
    {
      "title": "OTel App",
      "uid": "otel-app",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_request_duration_seconds_count{job=\"kubernetes-pods\", pod=~\"otel-app.*\"}[1m])) by (http_route, http_method)",
              "legendFormat": "{{ "{{" }}http_method{{ "}}" }} {{ "{{" }}http_route{{ "}}" }}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Request Duration P50 / P95 / P99",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"kubernetes-pods\", pod=~\"otel-app.*\"}[1m])) by (le, http_route))",
              "legendFormat": "p50 {{ "{{" }}http_route{{ "}}" }}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"kubernetes-pods\", pod=~\"otel-app.*\"}[1m])) by (le, http_route))",
              "legendFormat": "p95 {{ "{{" }}http_route{{ "}}" }}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"kubernetes-pods\", pod=~\"otel-app.*\"}[1m])) by (le, http_route))",
              "legendFormat": "p99 {{ "{{" }}http_route{{ "}}" }}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_request_duration_seconds_count{job=\"kubernetes-pods\", pod=~\"otel-app.*\", http_status_code=~\"5..\"}[1m])) by (http_route)",
              "legendFormat": "5xx {{ "{{" }}http_route{{ "}}" }}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Request Duration Heatmap",
          "type": "heatmap",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(http_request_duration_seconds_bucket{job=\"kubernetes-pods\", pod=~\"otel-app.*\"}[1m])) by (le)",
              "legendFormat": "{{ "{{" }}le{{ "}}" }}"
            }
          ]
        }
      ]
    }
