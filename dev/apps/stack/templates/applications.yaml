{{- range $name, $app := .Values.apps }}
{{- if ne $app.enabled false }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: argocd
  {{- if $app.syncWave }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ $app.syncWave | quote }}
  {{- end }}
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: {{ $.Values.appRepo }}
    targetRevision: {{ $.Values.revision }}
    path: {{ $.Values.appsPath }}/{{ $name }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $app.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
{{- end }}
