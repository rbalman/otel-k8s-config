mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-k8s

# clusterMetrics: adds k8sclusterreceiver (cluster-level kube-state-like metrics).
# kubernetesAttributes: enriches all signals with pod/namespace/node metadata.
presets:
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: false
    extractAllPodAnnotations: false
  clusterMetrics:
    enabled: true

# Extra RBAC rules needed by prometheus/apps receiver for pod auto-discovery.
# The presets create the ClusterRole; these rules are appended to it.
clusterRole:
  rules:
    - apiGroups: [""]
      resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods", "namespaces"]
      verbs: ["get", "list", "watch"]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ports:
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

config:
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133

  receivers:
    # null out chart defaults not used in any pipeline
    jaeger: null
    zipkin: null
    prometheus: null  # self-monitoring scrape; not wired into any pipeline

    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    prometheus/apps:
      config:
        scrape_configs:
          - job_name: kubernetes-pods
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              # only scrape pods with prometheus.io/scrape: "true"
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
              # honour prometheus.io/path annotation, default is /metrics
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              # rewrite host:port using prometheus.io/port annotation
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                target_label: __address__
              # carry all pod labels through as metric labels
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              # add namespace and pod name labels
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod

  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    batch: {}
    resource:
      attributes:
        - key: environment
          value: dev
          action: insert
        - key: k8s.cluster.name
          value: gokite
          action: insert

  exporters:
    otlp/jaeger:
      endpoint: jaeger.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
    otlphttp/prometheus:
      endpoint: http://prometheus-server.monitoring.svc.cluster.local/api/v1/otlp
      tls:
        insecure: true

  service:
    extensions:
      - health_check
    pipelines:
      logs: null  # remove chart default logs→debug pipeline
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - k8sattributes
          - resource
          - batch
        exporters:
          - otlp/jaeger
      metrics:
        receivers:
          - otlp
          - k8s_cluster       # added by clusterMetrics preset
          - prometheus/apps   # pod annotation-based scrape discovery
        processors:
          - memory_limiter
          - k8sattributes
          - resource
          - batch
        exporters:
          - otlphttp/prometheus
