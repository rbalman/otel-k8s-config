prometheus:
  server:
    ingress:
      enabled: true
      hosts:
        - prometheus.localhost
      pathType: Prefix

    retention: "3d"
    extraFlags:
      - web.enable-remote-write-receiver
      - web.enable-otlp-receiver
    global:
      external_labels:
        cluster: local
    persistentVolume:
      storageClass: standard
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 800Mi
      limits:
        cpu: 500m
        memory: 2Gi

  alertmanager:
    enabled: true
    persistence:
      storageClass: standard
      size: 1Gi
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

  prometheus-pushgateway:
    enabled: false

  kube-state-metrics:
    enabled: false

  prometheus-node-exporter:
    enabled: false

  scrapeConfigs:
    prometheus:
      enabled: true
    prometheus-pushgateway:
      enabled: false
    kubernetes-api-servers:
      enabled: false
    kubernetes-nodes:
      enabled: false
    kubernetes-nodes-cadvisor:
      enabled: false
    kubernetes-service-endpoints:
      enabled: false
    kubernetes-service-endpoints-slow:
      enabled: false
    kubernetes-services:
      enabled: false
    kubernetes-pods:
      enabled: false
    kubernetes-pods-slow:
      enabled: false
