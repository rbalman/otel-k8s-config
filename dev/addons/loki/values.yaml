loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage_config:
    tsdb_shipper:
      active_index_directory: /var/loki/index
      cache_location: /var/loki/index_cache
    aws:
      s3: http://loki:loki-secret@minio.minio.svc:9000/loki
      s3forcepathstyle: true
  storage:
    type: s3
    s3:
      endpoint: minio.minio.svc:9000
      accessKeyId: loki
      secretAccessKey: loki-secret
      insecure: true
      s3ForcePathStyle: true
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki
      # chunks: loki-chunks
      # ruler: loki-ruler
      # admin: loki-admin
  pattern_ingester:
    enabled: true
  limits_config:
    ## Mark: accept structured metadata
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 360h # 14 days retention
  compactor:
    retention_enabled: true
    delete_request_store: s3
  ruler:
    enable_api: true

resultsCache:
  enabled: false

chunksCache:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: false

minio:
  enabled: false
      
deploymentMode: SingleBinary

serviceAccount:
  name: loki-sa
  create: true

singleBinary:
  ##Mark can be added
  # priorityClassName: app-critical
  resources:
    requests:
      cpu: 500m
      memory: 800Mi
    limits:
      cpu: 1
      memory: 1Gi
  replicas: 1
  persistence:
    enabled: true
    storageClass: standard
    accessModes:
      - ReadWriteOnce
    ##Mark: can be increase
    size: 2Gi
    mountPath: /var/loki

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0